version: '3.8'

services:
  poker-server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - CLIENT_URL=*
    volumes:
      - ./data:/data
    restart: unless-stopped
    networks:
      - poker-network

  poker-client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - poker-server
    restart: unless-stopped
    networks:
      - poker-network

networks:
  poker-network:
    driver: bridge
